name: Generate INO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # Supaya bisa push file ke repo

jobs:
  generate-ino:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create INO file from CPP
        run: |
          # Nama file .ino yang dihasilkan
          INO_NAME="ESP32_Game"
          
          # Copy file cpp di root ke .ino di root
          if [ -f src.ino.cpp ]; then
            cp src.ino.cpp "$INO_NAME.ino"
            echo "File $INO_NAME.ino created in root repo"
          else
            echo "src.ino.cpp not found!"
            exit 1
          fi

      - name: Commit and push INO
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.ino
          git commit -m "Auto-generate INO from src.ino.cpp" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
