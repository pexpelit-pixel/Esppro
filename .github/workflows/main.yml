name: Build ESP32 BIN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Prepare INO
        run: |
          # Nama project ESP32
          PROJECT_NAME="ESP32_Game"
          mkdir -p $PROJECT_NAME/src
          
          # Gabung semua .cpp di root menjadi main.ino
          cat *.cpp > $PROJECT_NAME/src/main.ino
          
          # Buat file platformio.ini
          cat <<EOT > $PROJECT_NAME/platformio.ini
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
EOT

      - name: Build BIN
        run: |
          cd ESP32_Game
          pio run

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ESP32-BIN
          path: ESP32_Game/.pio/build/esp32dev/firmware.bin
